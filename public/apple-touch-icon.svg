        <g fill="none">
            <path d="M32 22 V34"/>
            <path d="M16 40 V34 H48 V40"/>
        </g>
        <circle cx="32" cy="16" r="6"/>
        <circle cx="16" cy="46" r="6"/>
        <circle cx="32" cy="46" r="6"/>
        <circle cx="48" cy="46" r="6"/>
    </g>
</svg>
