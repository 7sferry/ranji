<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#3730a3"/>
        </linearGradient>
        <radialGradient id="glow" cx="0.8" cy="0.2" r="0.9">
            <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>

    <!-- Subtle dotted grid -->
    <g fill="#ffffff" fill-opacity="0.05">
        <circle cx="60" cy="60" r="2"/>
        <circle cx="180" cy="60" r="2"/>
        <circle cx="300" cy="60" r="2"/>
        <circle cx="60" cy="180" r="2"/>
        <circle cx="180" cy="180" r="2"/>
        <circle cx="300" cy="180" r="2"/>
        <circle cx="1140" cy="570" r="2"/>
        <circle cx="1020" cy="570" r="2"/>
        <circle cx="900" cy="570" r="2"/>
        <circle cx="1140" cy="450" r="2"/>
        <circle cx="1020" cy="450" r="2"/>
        <circle cx="900" cy="450" r="2"/>
    </g>

    <!-- Family tree icon (left) -->
    <g transform="translate(110 175)" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="#ffffff">
        <!-- Connectors -->
        <g fill="none">
            <path d="M140 70 V140"/>
            <path d="M40 200 V160 H240 V200"/>
        </g>
        <!-- Nodes -->
        <circle cx="140" cy="40" r="32"/>
        <circle cx="40" cy="230" r="32"/>
        <circle cx="140" cy="230" r="32"/>
        <circle cx="240" cy="230" r="32"/>
    </g>

    <!-- Wordmark -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
       fill="#ffffff">
        <text x="450" y="280" font-size="140" font-weight="800" letter-spacing="-4">Ranji</text>
        <text x="452" y="350" font-size="42" font-weight="600" fill-opacity="0.95">Free Family Tree Builder</text>
        <text x="452" y="410" font-size="28" font-weight="400" fill-opacity="0.75">Build &amp; visualize your genealogy
            — right in your browser.
        </text>
    </g>

    <!-- URL pill -->
    <g transform="translate(450 480)">
        <rect width="320" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.35"
              stroke-width="1.5"/>
        <text x="160" y="37" text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
              font-size="24" font-weight="600" fill="#ffffff">treefam.netlify.app
        </text>
    </g>
</svg>
